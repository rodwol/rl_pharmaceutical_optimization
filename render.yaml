# render.yaml
# Defines all three RxGuard services for one-click Render deployment,
# including a managed PostgreSQL database.
#
# Deploy: Render dashboard -> New -> Blueprint -> connect this repo.

databases:
  - name: rebex-db
    databaseName: rebex_db
    user: rxguard
    plan: free

services:

  # ── FastAPI Backend ──────────────────────────────────────────────────────
  - type: web
    name: rebex-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DATABASE_URL
        fromDatabase:
          name: rebex-db
          property: connectionString
    healthCheckPath: /health

  # Streamlit Dashboard 
  - type: web
    name: dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: >
      streamlit run dashboard/Home.py
      --server.port $PORT
      --server.address 0.0.0.0
      --server.headless true
      --server.enableCORS false
      --server.enableXsrfProtection false
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: REBEX_API_URL
        value: https://rl-pharmaceutical-optimization.onrender.com