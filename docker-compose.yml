# db (PostgreSQL) + api (FastAPI) + dashboard (Streamlit)
# Usage:
#   cp .env.example .env
#   docker-compose up --build

version: "3.9"

services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rxguard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rxguard_dev}
      POSTGRES_DB: ${POSTGRES_DB:-rxguard_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rxguard}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: os.getenv("DATABASE_URL")
    env_file:
      - .env
    volumes:
      - ./models:/app/models:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  dashboard:
    build: .
    restart: unless-stopped
    command: streamlit run dashboard/app.py --server.port 8501 --server.headless true
    ports:
      - "8501:8501"
    environment:
      REBEX_API_URL: http://api:8000
    env_file:
      - .env
    volumes:
      - ./models:/app/models:ro
    depends_on:
      - api

volumes:
  postgres_data: